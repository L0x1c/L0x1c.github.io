(function() {
    const output = document.getElementById('terminal-output');
    const input = document.getElementById('terminal-input');
    const data = window.__BLOG_DATA__;
    const history = [];
    let historyIndex = -1;

    const COLORS = {
        green: '#00ff41',
        dimGreen: '#00cc33',
        cyan: '#56b6c2',
        yellow: '#e5c07b',
        blue: '#5fafff',
        red: '#ff5555',
        purple: '#c678dd',
        dim: '#666666',
        text: '#b0b0b0',
        white: '#e0e0e0'
    };

    function c(text, color) {
        return `<span style="color:${color}">${text}</span>`;
    }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function writeLine(html) {
        const line = document.createElement('div');
        line.className = 'terminal-line';
        line.innerHTML = html;
        output.appendChild(line);
    }

    function writeBlock(lines) {
        lines.forEach(l => writeLine(l));
    }

    function scrollToBottom() {
        const container = document.querySelector('.terminal-emulator');
        container.scrollTop = container.scrollHeight;
    }

    

    const commands = {

        help: function() {
            writeBlock([
                '',
                `  ${c('ls', COLORS.cyan)}            ${c('List posts', COLORS.dim)}`,
                `  ${c('ls -l', COLORS.cyan)}         ${c('List posts (detailed)', COLORS.dim)}`,
                `  ${c('ls tags', COLORS.cyan)}        ${c('List all tags', COLORS.dim)}`,
                `  ${c('cat', COLORS.cyan)} ${c('<n>', COLORS.yellow)}       ${c('Read post by number or keyword', COLORS.dim)}`,
                `  ${c('cd', COLORS.cyan)} ${c('<page>', COLORS.yellow)}     ${c('Go to about / archive / tags / search', COLORS.dim)}`,
                `  ${c('grep', COLORS.cyan)} ${c('<word>', COLORS.yellow)}   ${c('Search posts', COLORS.dim)}`,
                `  ${c('whoami', COLORS.cyan)}         ${c('About me', COLORS.dim)}`,
                `  ${c('clear', COLORS.cyan)}          ${c('Clear screen', COLORS.dim)}`,
                ''
            ]);
        },

        ls: function(args) {
            if (args === 'tags' || args === '-tags') {
                const allTags = {};
                data.posts.forEach(p => {
                    (p.tags || []).forEach(t => { allTags[t] = (allTags[t]||0) + 1; });
                });
                writeLine('');
                const tagList = Object.entries(allTags).sort((a,b) => b[1]-a[1]);
                tagList.forEach(([tag, count]) => {
                    writeLine(`  ${c('#'+tag, COLORS.yellow)}  ${c('('+count+')', COLORS.dim)}`);
                });
                writeLine('');
                return;
            }

            const detailed = (args === '-l' || args === '-la' || args === '-al');
            writeLine('');
            if (detailed) {
                writeLine(c('total ' + data.posts.length, COLORS.dim));
                data.posts.forEach((p, i) => {
                    const num = c(String(i).padStart(2, ' '), COLORS.dim);
                    const date = c(p.date, COLORS.yellow);
                    const time = c(p.readingTime.padStart(6), COLORS.dim);
                    const words = c(String(p.wordCount).padStart(5) + 'w', COLORS.dim);
                    const title = c(escapeHtml(p.title), COLORS.cyan);
                    writeLine(`  ${num}  ${date}  ${time}  ${words}  ${title}`);
                });
            } else {
                data.posts.forEach((p, i) => {
                    const num = c(String(i).padStart(2, ' ') + '.', COLORS.dimGreen);
                    const title = c(escapeHtml(p.title), COLORS.cyan);
                    const date = c('(' + p.date + ')', COLORS.dim);
                    writeLine(`  ${num} ${title}  ${date}`);
                });
            }
            writeLine('');
            writeLine(c(`  ${data.posts.length} posts found. Use "cat <number>" to read a post.`, COLORS.dim));
            writeLine('');
        },

        cat: function(args) {
            if (!args) {
                writeLine(c('Usage: cat <post-number or keyword>', COLORS.red));
                return;
            }
            let post = null;
            const num = parseInt(args);
            if (!isNaN(num) && num >= 0 && num < data.posts.length) {
                post = data.posts[num];
            } else {
                const q = args.toLowerCase();
                post = data.posts.find(p =>
                    p.title.toLowerCase().includes(q) ||
                    p.slug.toLowerCase().includes(q)
                );
            }
            if (post) {
                writeLine('');
                writeLine(c('Opening: ' + escapeHtml(post.title), COLORS.green));
                writeLine(c('Redirecting...', COLORS.dim));
                writeLine('');
                setTimeout(() => { window.location.href = post.url; }, 600);
            } else {
                writeLine(c(`cat: ${escapeHtml(args)}: No such post`, COLORS.red));
                writeLine(c('Use "ls" to see available posts', COLORS.dim));
            }
        },

        cd: function(args) {
            if (!args || args === '~' || args === '/') {
                window.location.href = '/';
                return;
            }
            const routes = {
                'about': '/about/',
                'archive': '/archives/',
                'archives': '/archives/',
                'search': '/search/',
                'tags': '/tags/',
                'categories': '/categories/',
                'posts': '/posts/',
                '..': '/',
                '-': '/'
            };
            const target = routes[args.toLowerCase()];
            if (target) {
                writeLine(c(`cd ${args}`, COLORS.dim));
                setTimeout(() => { window.location.href = target; }, 300);
            } else {
                writeLine(c(`bash: cd: ${escapeHtml(args)}: No such directory`, COLORS.red));
                writeLine(c('Available: about, archive, tags, categories, search, posts', COLORS.dim));
            }
        },

        grep: function(args) {
            if (!args) {
                writeLine(c('Usage: grep <keyword>', COLORS.red));
                return;
            }
            const q = args.toLowerCase();
            const results = data.posts.filter(p =>
                p.title.toLowerCase().includes(q) ||
                (p.summary && p.summary.toLowerCase().includes(q)) ||
                (p.tags || []).some(t => t.toLowerCase().includes(q)) ||
                (p.categories || []).some(c => c.toLowerCase().includes(q))
            );
            writeLine('');
            if (results.length === 0) {
                writeLine(c(`No results for "${escapeHtml(args)}"`, COLORS.red));
            } else {
                writeLine(c(`Found ${results.length} result(s) for "${escapeHtml(args)}":`, COLORS.green));
                writeLine('');
                results.forEach((p, i) => {
                    writeLine(`  ${c(String(i), COLORS.dimGreen)}  ${c(escapeHtml(p.title), COLORS.cyan)}  ${c(p.date, COLORS.dim)}`);
                    if (p.summary) {
                        const highlighted = escapeHtml(p.summary).replace(
                            new RegExp('(' + escapeHtml(args) + ')', 'gi'),
                            `<span style="background:${COLORS.yellow};color:#000;padding:0 2px">$1</span>`
                        );
                        writeLine(`     ${c(highlighted, COLORS.dim)}`);
                    }
                });
            }
            writeLine('');
        },

        find: function(args) { commands.grep(args); },

        whoami: function() {
            writeBlock([
                '',
                c('  ' + data.author, COLORS.green),
                c('  Security Researcher / Reverse Engineer', COLORS.text),
                '',
                `  ${c('GitHub:', COLORS.cyan)}  https://github.com/L0x1c`,
                `  ${c('X:', COLORS.cyan)}       https://x.com/L0x1c`,
                `  ${c('Blog:', COLORS.cyan)}    ${data.baseURL}`,
                ''
            ]);
        },

        pwd: function() {
            writeLine('/home/l0x1c/blog');
        },

        date: function() {
            writeLine(new Date().toString());
        },

        history: function() {
            history.forEach((cmd, i) => {
                writeLine(`  ${c(String(i+1).padStart(4), COLORS.dim)}  ${escapeHtml(cmd)}`);
            });
        },

        clear: function() {
            output.innerHTML = '';
        },

        echo: function(args) {
            writeLine(args ? escapeHtml(args) : '');
        }
    };

    
    function init() {
        writeLine(c('Type "help" for commands, or "ls" to list posts.', COLORS.dim));
        writeLine('');
        input.focus();
    }

    
    function execute(raw) {
        const trimmed = raw.trim();
        if (!trimmed) return;

        
        writeLine(`${c('l0x1c@blog:~$', COLORS.green)} ${escapeHtml(trimmed)}`);
        history.push(trimmed);
        historyIndex = history.length;

        const parts = trimmed.split(/\s+/);
        const cmd = parts[0].toLowerCase();
        const args = parts.slice(1).join(' ');

        if (commands[cmd]) {
            commands[cmd](args);
        } else {
            writeLine(c(`bash: ${escapeHtml(cmd)}: command not found. Try "help"`, COLORS.red));
        }

        scrollToBottom();
    }

    
    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            execute(input.value);
            input.value = '';
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (historyIndex > 0) {
                historyIndex--;
                input.value = history[historyIndex];
            }
        } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIndex < history.length - 1) {
                historyIndex++;
                input.value = history[historyIndex];
            } else {
                historyIndex = history.length;
                input.value = '';
            }
        } else if (e.key === 'Tab') {
            e.preventDefault();
            const val = input.value.toLowerCase().trim();
            const cmdNames = Object.keys(commands);
            const match = cmdNames.filter(c => c.startsWith(val));
            if (match.length === 1) {
                input.value = match[0] + ' ';
            } else if (match.length > 1) {
                writeLine(`${c('l0x1c@blog:~$', COLORS.green)} ${escapeHtml(input.value)}`);
                writeLine(match.map(m => c(m, COLORS.cyan)).join('  '));
                scrollToBottom();
            }
        } else if (e.key === 'l' && e.ctrlKey) {
            e.preventDefault();
            commands.clear();
        }
    });

    
    document.querySelector('.terminal-emulator').addEventListener('click', function() {
        input.focus();
    });

    init();

})();
</script>
